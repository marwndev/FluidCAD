name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    if: github.repository == 'Fluid-CAD/FluidCAD'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      - name: Publish to npm
        run: npm publish --tag next --provenance && npm dist-tag add fluidcad@${GITHUB_REF_NAME#v} latest
